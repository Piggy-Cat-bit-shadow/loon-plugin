name: Update merged Loon plugin

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run merge script
        run: |
          python scripts/merge_loon_plugins.py

      - name: Show generated file
        if: always()
        run: |
          echo "===== dist/merged-adblock.plugin ====="
          if [ -f dist/merged-adblock.plugin ]; then
            sed -n '1,120p' dist/merged-adblock.plugin
          else
            echo "File not found"
          fi

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet -- dist cache config scripts local README.md requirements.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/merged-adblock.plugin cache/ config/ scripts/ local/ README.md requirements.txt
          git commit -m "chore: update merged Loon plugin"

      - name: Push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git push
